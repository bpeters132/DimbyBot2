# Production: Next.js dashboard (separate from the bot container).
# Use with the base stack, e.g. `docker compose -f docker-compose.yml -f docker-compose.dashboard.yml up -d`
# Requires `WEB_IMAGE` in `.env` (CI deploy writes this from the web image build).
#
# Bot API is not published on the host: set API_PROXY_TARGET to the in-stack bot service (default
# `http://dimbybot:${BOT_API_PORT:-3001}`). Service hostname `dimbybot` matches `container_name` on
# the shared `internal` network from docker-compose.yml.

services:
    dimbybot-web:
        image: ${WEB_IMAGE:?WEB_IMAGE must be set (dashboard container image)}
        container_name: dimbybot-web
        restart: unless-stopped
        depends_on:
            postgres-db:
                condition: service_healthy
            dimbybot:
                condition: service_healthy
        environment:
            - NODE_ENV=production
            - PORT=3000
            # Prefer DATABASE_URL from project .env (CI deploy always writes it; password URL-encoded there).
            # POSTGRES_* are passed so web-entrypoint.sh can build DATABASE_URL at runtime if compose interpolation is empty.
            - DATABASE_URL=${DATABASE_URL}
            - POSTGRES_USER=${POSTGRES_USER}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            - POSTGRES_DB=${POSTGRES_DB}
            - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
            - BETTER_AUTH_URL=${BETTER_AUTH_URL}
            - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
            - CLIENT_ID=${CLIENT_ID}
            - EMAIL_USER=${EMAIL_USER}
            - EMAIL_PASS=${EMAIL_PASS}
            - FEEDBACK_EMAIL=${FEEDBACK_EMAIL}
            # In-stack bot API (Express + /ws on dimbybot; not reachable from outside Docker without a proxy).
            - API_PROXY_TARGET=${API_PROXY_TARGET:-http://dimbybot:${BOT_API_PORT:-3001}}
            - WEBSOCKET_CLIENT_URL=${WEBSOCKET_CLIENT_URL:-}
            - BOT_API_VERBOSE=${BOT_API_VERBOSE:-}
            - WEB_BOT_API_VERBOSE=${WEB_BOT_API_VERBOSE:-}
        ports:
            - "${WEB_PORT:-3000}:3000"
        # `/api/status` can take >5s (DB + bot); use lightweight `/api/health` for container liveness.
        healthcheck:
            test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/api/health"]
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 60s
        networks:
            - internal
