name: CI/CD

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    REGISTRY: ghcr.io
    IMAGE_BOT: ghcr.io/${{ github.repository_owner }}/dimbybot2/bot:latest
    IMAGE_BOT_SHA: ghcr.io/${{ github.repository_owner }}/dimbybot2/bot:${{ github.sha }}
    IMAGE_LAVALINK: ghcr.io/${{ github.repository_owner }}/dimbybot2/lavalink:latest
    IMAGE_LAVALINK_SHA: ghcr.io/${{ github.repository_owner }}/dimbybot2/lavalink:${{ github.sha }}

permissions:
    contents: read

on:
    push:
        branches:
            - main
    workflow_dispatch:
        inputs:
            skip_build:
                description: "Skip building images (use existing ones)"
                required: true
                default: false
                type: boolean

concurrency:
    group: deploy-${{ github.ref }}
    cancel-in-progress: false

jobs:
    validate-node-lts:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: read
        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Set up Node.js (latest LTS)
              uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
              with:
                  node-version: "lts/*"
                  cache: "yarn"

            - name: Enable Corepack
              run: corepack enable

            - name: Install dependencies
              run: yarn install --frozen-lockfile

            - name: Install web dependencies
              run: yarn web:install --frozen-lockfile

            - name: Generate Prisma client
              run: yarn db:generate

            - name: Validate build inputs
              run: |
                  yarn typecheck
                  yarn lint

    build-and-push:
        needs: validate-node-lts
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_build }}
        runs-on: ubuntu-latest
        timeout-minutes: 25
        permissions:
            contents: read
            packages: write
        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push bot image
              uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
              with:
                  context: .
                  file: Dockerfile
                  push: true
                  tags: |
                      ${{ env.IMAGE_BOT }}
                      ${{ env.IMAGE_BOT_SHA }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  provenance: true
                  sbom: true

            - name: Verify bot image contains Prisma runtime assets
              run: |
                  docker pull "$IMAGE_BOT_SHA"
                  docker run --rm --entrypoint /bin/sh "$IMAGE_BOT_SHA" -c "test -f /app/dist/server.js"
                  docker run --rm --entrypoint /bin/sh "$IMAGE_BOT_SHA" -c "test -f /app/prisma/schema.prisma"
                  docker run --rm --entrypoint /bin/sh "$IMAGE_BOT_SHA" -c "test -d /app/prisma/migrations"
                  docker run --rm --entrypoint /bin/sh "$IMAGE_BOT_SHA" -c "test -f /app/prisma.config.ts"

            - name: Verify bot image contains web build
              run: |
                  docker run --rm --entrypoint /bin/sh "$IMAGE_BOT_SHA" -c "test -f /app/src/web/.next/standalone/server.js"
                  docker run --rm --entrypoint /bin/sh "$IMAGE_BOT_SHA" -c "test -d /app/src/web/.next/standalone/.next/static"

            - name: Build lavalink image
              run: |
                  docker build -t "$IMAGE_LAVALINK" -t "$IMAGE_LAVALINK_SHA" -f Lavalink/Dockerfile ./Lavalink

            - name: Push bot image
              run: |
                  docker push "$IMAGE_BOT"
                  docker push "$IMAGE_BOT_SHA"

            - name: Push lavalink image
              run: |
                  docker push "$IMAGE_LAVALINK"
                  docker push "$IMAGE_LAVALINK_SHA"

    deploy:
        needs:
            - validate-node-lts
            - build-and-push
        if: always() && needs.validate-node-lts.result == 'success' && (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped')
        runs-on: ubuntu-latest
        timeout-minutes: 15
        permissions:
            contents: read
            packages: read
        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            # .env is loaded by docker compose; dimbybot receives Spotify + MusicBrainz vars via docker-compose.yml (autoplay).
            - name: Generate .env file
              env:
                  WEB_ENABLED: ${{ secrets.WEB_ENABLED }}
                  WEB_PORT: ${{ secrets.WEB_PORT }}
                  DASHBOARD_PORT: ${{ secrets.DASHBOARD_PORT }}
                  API_PROXY_TARGET: ${{ secrets.API_PROXY_TARGET }}
                  WEBSOCKET_CLIENT_URL: ${{ secrets.WEBSOCKET_CLIENT_URL }}
                  POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
                  POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
              run: |
                  WEB_ENABLED_VAL="${WEB_ENABLED:-true}"
                  WEB_PORT_VAL="${WEB_PORT:-3001}"
                  DASHBOARD_PORT_VAL="${DASHBOARD_PORT:-3000}"
                  API_PROXY_TARGET_VAL="${API_PROXY_TARGET:-http://127.0.0.1:${WEB_PORT_VAL}}"
                  WEBSOCKET_CLIENT_URL_VAL="${WEBSOCKET_CLIENT_URL:-}"
                  export POSTGRES_HOST_VAL="${POSTGRES_HOST:-postgres-db}"
                  export POSTGRES_PORT_VAL="${POSTGRES_PORT:-5432}"
                  export POSTGRES_USER="${{ secrets.POSTGRES_USER }}"
                  export POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}"
                  export POSTGRES_DB="${{ secrets.POSTGRES_DB }}"
                  DATABASE_URL_VAL="$(node -e "const u=process.env.POSTGRES_USER||'';const p=encodeURIComponent(process.env.POSTGRES_PASSWORD||'');const h=process.env.POSTGRES_HOST_VAL||'postgres-db';const pt=process.env.POSTGRES_PORT_VAL||'5432';const d=process.env.POSTGRES_DB||'';console.log('postgresql://'+u+':'+p+'@'+h+':'+pt+'/'+d)")"
                  cat << EOF > .env
                  BOT_TOKEN=${{ secrets.BOT_TOKEN }}
                  CLIENT_ID=${{ secrets.CLIENT_ID }}
                  DISCORD_CLIENT_SECRET=${{ secrets.DISCORD_CLIENT_SECRET }}
                  BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}
                  BETTER_AUTH_URL=${{ secrets.BETTER_AUTH_URL }}
                  GUILD_ID=${{ secrets.GUILD_ID }}
                  OWNER_ID=${{ secrets.OWNER_ID }}
                  DEV_MODE=${{ secrets.DEV_MODE }}
                  LOG_LEVEL=${{ secrets.LOG_LEVEL }}
                  WEB_ENABLED=${WEB_ENABLED_VAL}
                  WEB_PORT=${WEB_PORT_VAL}
                  DASHBOARD_PORT=${DASHBOARD_PORT_VAL}
                  API_PROXY_TARGET=${API_PROXY_TARGET_VAL}
                  WEBSOCKET_CLIENT_URL=${WEBSOCKET_CLIENT_URL_VAL}
                  DATABASE_URL=${DATABASE_URL_VAL}
                  LAVALINK_HOST=${{ secrets.LAVALINK_HOST }}
                  LAVALINK_PORT=${{ secrets.LAVALINK_PORT }}
                  LAVALINK_PASSWORD=${{ secrets.LAVALINK_PASSWORD }}
                  LAVALINK_NODE_ID=${{ secrets.LAVALINK_NODE_ID }}
                  LAVALINK_SECURE=${{ secrets.LAVALINK_SECURE }}
                  LAVALINK_YOUTUBE_POT_TOKEN=${{ secrets.LAVALINK_YOUTUBE_POT_TOKEN }}
                  LAVALINK_YOUTUBE_POT_VISITORDATA=${{ secrets.LAVALINK_YOUTUBE_POT_VISITORDATA }}
                  LAVALINK_SPOTIFY_ENABLED=${{ secrets.LAVALINK_SPOTIFY_ENABLED }}
                  LAVALINK_SPOTIFY_CLIENT_ID=${{ secrets.LAVALINK_SPOTIFY_CLIENT_ID }}
                  LAVALINK_SPOTIFY_CLIENT_SECRET=${{ secrets.LAVALINK_SPOTIFY_CLIENT_SECRET }}
                  LAVALINK_SPOTIFY_COUNTRY_CODE=${{ secrets.LAVALINK_SPOTIFY_COUNTRY_CODE }}
                  LAVALINK_SPOTIFY_PLAYLIST_LOAD_LIMIT=${{ secrets.LAVALINK_SPOTIFY_PLAYLIST_LOAD_LIMIT }}
                  LAVALINK_SPOTIFY_ALBUM_LOAD_LIMIT=${{ secrets.LAVALINK_SPOTIFY_ALBUM_LOAD_LIMIT }}
                  SPOTIFY_CLIENT_ID=${{ secrets.SPOTIFY_CLIENT_ID }}
                  SPOTIFY_CLIENT_SECRET=${{ secrets.SPOTIFY_CLIENT_SECRET }}
                  MUSICBRAINZ_CONTACT=${{ secrets.MUSICBRAINZ_CONTACT }}
                  MUSICBRAINZ_CONTACT_URL=${{ secrets.MUSICBRAINZ_CONTACT_URL }}
                  MUSICBRAINZ_SIMILAR=${{ secrets.MUSICBRAINZ_SIMILAR }}
                  EMAIL_USER=${{ secrets.EMAIL_USER }}
                  EMAIL_PASS=${{ secrets.EMAIL_PASS }}
                  FEEDBACK_EMAIL=${{ secrets.FEEDBACK_EMAIL }}
                  POSTGRES_DB=${{ secrets.POSTGRES_DB }}
                  POSTGRES_USER=${{ secrets.POSTGRES_USER }}
                  POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
                  BOT_IMAGE=${{ env.IMAGE_BOT_SHA }}
                  LAVALINK_IMAGE=${{ env.IMAGE_LAVALINK_SHA }}
                  GH_ACTOR=${{ github.actor }}
                  GH_TOKEN=${{ secrets.GITHUB_TOKEN }}
                  EOF

            - name: Copy files to server
              uses: appleboy/scp-action@917f8b81dfc1ccd331fef9e2d61bdc6c8be94634 # v0.1.7
              with:
                  host: ${{ secrets.DEPLOY_SERVER_HOST }}
                  username: ${{ secrets.DEPLOY_SERVER_USER }}
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  port: ${{ secrets.DEPLOY_SERVER_SSH_PORT }}
                  # Production stack only — do not add docker-compose.dev.yml (local bind mounts / Dockerfile.dev).
                  source: ".env,docker-compose.yml"
                  target: "/home/bot/"

            - name: Copy deployment script to server
              run: |
                  cat << 'EOS' > ci_deploy.sh
                  #!/bin/bash
                  set -e
                  cd /home/bot
                  export $(grep -v '^#' .env | xargs)
                  echo "$GH_TOKEN" | /usr/bin/docker login ghcr.io -u "$GH_ACTOR" --password-stdin
                  /usr/bin/docker compose down
                  /usr/bin/docker compose pull
                  /usr/bin/docker compose up -d
                  /usr/bin/docker image prune -f
                  EOS

                  # Create SSH key file with proper permissions
                  echo "${{ secrets.SSH_PRIVATE_KEY }}" > deploy_key
                  chmod 600 deploy_key

                  # Use the key file for SCP
                  scp -i deploy_key -P ${{ secrets.DEPLOY_SERVER_SSH_PORT }} -o StrictHostKeyChecking=accept-new ci_deploy.sh ${{ secrets.DEPLOY_SERVER_USER }}@${{ secrets.DEPLOY_SERVER_HOST }}:/home/bot/ci_deploy.sh

                  # Clean up the key file
                  rm -f deploy_key

            - name: Run deployment script on server
              uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262 # v1.0.3
              with:
                  host: ${{ secrets.DEPLOY_SERVER_HOST }}
                  username: ${{ secrets.DEPLOY_SERVER_USER }}
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  port: ${{ secrets.DEPLOY_SERVER_SSH_PORT }}
                  script: |
                      bash /home/bot/ci_deploy.sh

            - name: Verify deployment health on server
              uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262 # v1.0.3
              with:
                  host: ${{ secrets.DEPLOY_SERVER_HOST }}
                  username: ${{ secrets.DEPLOY_SERVER_USER }}
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  port: ${{ secrets.DEPLOY_SERVER_SSH_PORT }}
                  script: |
                      set -e
                      max_attempts=40
                      sleep_seconds=2
                      attempt=1
                      while [ "$attempt" -le "$max_attempts" ]; do
                        ok_bot=0
                        ok_dashboard=0
                        if curl --fail --silent "http://127.0.0.1:${WEB_PORT:-3001}/health" >/dev/null 2>&1; then ok_bot=1; fi
                        if curl --fail --silent "http://127.0.0.1:${DASHBOARD_PORT:-3000}/api/status" >/dev/null 2>&1; then ok_dashboard=1; fi
                        if [ "$ok_bot" -eq 1 ] && [ "$ok_dashboard" -eq 1 ]; then
                          echo "Health checks passed on attempt $attempt"
                          exit 0
                        fi
                        echo "Health probe attempt $attempt/$max_attempts (bot:${WEB_PORT:-3001}/health=$ok_bot dashboard:${DASHBOARD_PORT:-3000}/api/status=$ok_dashboard) — sleeping ${sleep_seconds}s"
                        sleep "$sleep_seconds"
                        attempt=$((attempt + 1))
                      done
                      echo "Deployment health checks failed after $max_attempts attempts" >&2
                      exit 1
