# Local development overrides merged with docker-compose.yml (e.g. dev-env.sh, Makefile, yarn docker:dev:*).
# Production deploy (.github/workflows/deploy.yml) copies only docker-compose.yml — this file is never used on the server.
services:
    dimbybot:
        build:
            context: .
            dockerfile: Dockerfile.dev # Use the development Dockerfile
        image: dimbybot-dev # Optional: Give the dev image a distinct name
        command: yarn dev # Override the default command/entrypoint to run nodemon
        # `ports: !override` replaces the base `dimbybot` publish list (Compose v2.24.4+); see README prerequisites.
        ports: !override
            - "3001:3001"
        volumes:
            # Mount the entire source code directory into the container
            # Note: Exclude node_modules to use the ones installed in the container
            - ./:/app
            - /app/node_modules # Anonymous volume to prevent local node_modules overwrite
            # Hide host-only nested install so `tsc -w` in the image does not see two lavalink-client copies.
            - /app/src/web/node_modules
            # Bind ./storage for dev. Guild settings live in Postgres; use `yarn docker:dev:down`
            # (no -v) or `./dev-env.sh down` so the `postgres-data` volume is kept. Only
            # `yarn docker:dev:down:volumes` / `./dev-env.sh down-volumes` wipes the DB.
            # Do not bind ./downloads here — Lavalink still uses the shared dimbybot-downloads volume.
            - ./storage:/app/storage
        environment:
            # Ensure NODE_ENV is set for development if needed by any libs
            - NODE_ENV=development
            - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost:3001}
            - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
            - CLIENT_ID=${CLIENT_ID:?CLIENT_ID is required for dev (Discord OAuth)}
            - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET:?DISCORD_CLIENT_SECRET is required for dev}
            - WEB_PORT=3001
            - WEB_ENABLED=true
            # Force color output for libraries like 'colors' or 'chalk'
            - FORCE_COLOR=true
            # Docker Desktop bind mounts can miss fs events; force polling for hot reload.
            - CHOKIDAR_USEPOLLING=true
            - WATCHPACK_POLLING=true
            - WATCHPACK_POLLING_INTERVAL=1000

    lavalink: # Add the lavalink service definition for development
        build:
            context: ./Lavalink # Point to the Lavalink directory
            dockerfile: Dockerfile # Assuming the Dockerfile is named 'Dockerfile'
        image: lavalink-dev # Optional: Give the dev image a distinct name

    postgres-db:
        ports:
            - "127.0.0.1:5432:5432"

    # Define other services ONLY if you need to override something specific
    # for them in development (e.g., different ports, debug flags).
    # Otherwise, the base docker-compose.yml definitions will be used.

# Keep volumes definition if it's not already in the base file or needs overrides
