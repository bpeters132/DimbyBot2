# Production / CI deploy: compose project is usually the host directory name (e.g. `bot` under /home/bot).
# Bot HTTP + WebSocket on BOT_API_PORT: host bind is BOT_API_HOST (default 127.0.0.1). Set BOT_API_HOST=0.0.0.0 or a
# private NIC IP so an off-box LAN reverse proxy can reach <host>:<BOT_API_PORT>. `dimbybot-web` still uses http://dimbybot:${BOT_API_PORT} on `internal`.
# With BOT_API_REQUIRE_PRIVATE_CLIENT_IP=1 (default), the bot rejects non–private-LAN TCP peers (RFC1918 + 127/8 + ::1).
services:
    lavalink:
        image: ${LAVALINK_IMAGE}
        container_name: lavalink
        restart: unless-stopped
        environment:
            # These will be picked up by Lavalink/entrypoint.sh
            - LAVALINK_PORT=${LAVALINK_PORT}
            - LAVALINK_PASSWORD=${LAVALINK_PASSWORD}
            - LAVALINK_YOUTUBE_POT_TOKEN=${LAVALINK_YOUTUBE_POT_TOKEN}
            - LAVALINK_YOUTUBE_POT_VISITORDATA=${LAVALINK_YOUTUBE_POT_VISITORDATA}
            - LAVALINK_SPOTIFY_ENABLED=${LAVALINK_SPOTIFY_ENABLED}
            - LAVALINK_SPOTIFY_CLIENT_ID=${LAVALINK_SPOTIFY_CLIENT_ID}
            - LAVALINK_SPOTIFY_CLIENT_SECRET=${LAVALINK_SPOTIFY_CLIENT_SECRET}
            - LAVALINK_SPOTIFY_COUNTRY_CODE=${LAVALINK_SPOTIFY_COUNTRY_CODE}
            - LAVALINK_SPOTIFY_PLAYLIST_LOAD_LIMIT=${LAVALINK_SPOTIFY_PLAYLIST_LOAD_LIMIT}
            - LAVALINK_SPOTIFY_ALBUM_LOAD_LIMIT=${LAVALINK_SPOTIFY_ALBUM_LOAD_LIMIT}
        ports:
            - "${LAVALINK_PORT}:${LAVALINK_PORT}" # Map host port to container port
        healthcheck:
            test: ["CMD", "/bin/sh", "/app/healthcheck.sh"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 15s
        volumes:
            - lavalink-plugins:/app/plugins
            - dimbybot-downloads:/app/downloads
        networks:
            - internal
        depends_on:
            - spotify-tokener

    spotify-tokener:
        # Pinned multi-arch manifest digest (replaces a floating tag) — refresh with: docker buildx imagetools inspect ghcr.io/topi314/spotify-tokener:latest --format "{{json .Manifest.Digest}}"
        image: ghcr.io/topi314/spotify-tokener@sha256:7841fa6144bd27b75b3ffc5d89c8201f833e0b9e2d3e8b4d5af8371504fd43f8
        container_name: spotify-tokener
        restart: unless-stopped
        networks:
            - internal

    postgres-db:
        image: postgres:15
        container_name: postgres-db
        restart: unless-stopped
        environment:
            - POSTGRES_DB=${POSTGRES_DB}
            - POSTGRES_USER=${POSTGRES_USER}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
        volumes:
            - postgres-data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
            interval: 10s
            timeout: 5s
            retries: 10
        networks:
            - internal

    dimbybot:
        image: ${BOT_IMAGE}
        container_name: dimbybot
        restart: unless-stopped
        depends_on:
            lavalink:
                condition: service_healthy # Wait for lavalink to pass its health check
            postgres-db:
                condition: service_healthy
        environment:
            # These will be picked up by entrypoint.sh for lavaNodesConfig.js
            - LAVALINK_HOST=lavalink # Service name in this compose file
            - LAVALINK_PORT=${LAVALINK_PORT}
            - LAVALINK_PASSWORD=${LAVALINK_PASSWORD}
            - LAVALINK_NODE_ID=${LAVALINK_NODE_ID}
            - LAVALINK_SECURE=${LAVALINK_SECURE}
            # Pass other bot-specific env vars from .env
            - BOT_TOKEN=${BOT_TOKEN}
            - CLIENT_ID=${CLIENT_ID}
            - GUILD_ID=${GUILD_ID}
            - OWNER_ID=${OWNER_ID}
            - DEV_MODE=${DEV_MODE}
            - LOG_LEVEL=${LOG_LEVEL}
            - BOT_API_VERBOSE=${BOT_API_VERBOSE:-}
            - WEB_BOT_API_VERBOSE=${WEB_BOT_API_VERBOSE:-}
            - BOT_API_PORT=${BOT_API_PORT:-3001}
            - BOT_API_REQUIRE_PRIVATE_CLIENT_IP=${BOT_API_REQUIRE_PRIVATE_CLIENT_IP:-1}
            # Optional absolute player WebSocket URL (ws/wss) for the dashboard container; see docker-compose.dashboard.yml.
            - WEBSOCKET_CLIENT_URL=${WEBSOCKET_CLIENT_URL:-}
            # Session verification for dashboard → bot API. The Next container (docker-compose.dashboard.yml) needs the same auth secrets.
            - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
            - BETTER_AUTH_URL=${BETTER_AUTH_URL}
            - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
            - EMAIL_PASS=${EMAIL_PASS}
            - EMAIL_USER=${EMAIL_USER}
            - FEEDBACK_EMAIL=${FEEDBACK_EMAIL}
            # Spotify Web API for autoplay (same credentials as Lavalink Spotify plugin; optional SPOTIFY_* overrides)
            - LAVALINK_SPOTIFY_CLIENT_ID=${LAVALINK_SPOTIFY_CLIENT_ID}
            - LAVALINK_SPOTIFY_CLIENT_SECRET=${LAVALINK_SPOTIFY_CLIENT_SECRET}
            - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
            - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
            # MusicBrainz autoplay fallback: requires MUSICBRAINZ_CONTACT or MUSICBRAINZ_CONTACT_URL in .env; SIMILAR defaults to off (see src/util/musicBrainzSimilarService.ts).
            - MUSICBRAINZ_CONTACT=${MUSICBRAINZ_CONTACT}
            - MUSICBRAINZ_CONTACT_URL=${MUSICBRAINZ_CONTACT_URL}
            - MUSICBRAINZ_SIMILAR=${MUSICBRAINZ_SIMILAR:-off}
            # Prefer DATABASE_URL from project .env (password URL-encoded). Fallback builds from POSTGRES_*.
            - DATABASE_URL=${DATABASE_URL:-postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-db:5432/${POSTGRES_DB}}
        # Named volumes: persist across `compose up`/`down` (no -v). CI deploy uses this file only;
        # docker-compose.dev.yml binds ./storage for local dev and is not shipped to production.
        volumes:
            - dimbybot-storage:/app/storage
            - dimbybot-logs:/app/logs
            - dimbybot-downloads:/app/downloads
        # Bot API + WebSocket on BOT_API_PORT — host bind BOT_API_HOST (default 127.0.0.1); set BOT_API_HOST for LAN-only listeners.
        # Pair with BOT_API_REQUIRE_PRIVATE_CLIENT_IP=1 (default) and host firewall rules so only RFC1918 sources reach the port.
        ports:
            - "${BOT_API_HOST:-127.0.0.1}:${BOT_API_PORT:-3001}:${BOT_API_PORT:-3001}"
        networks:
            - internal

networks:
    internal:
        driver: bridge

volumes:
    dimbybot-storage: {} # Define the new named volume for bot storage
    dimbybot-logs: {} # Define the new named volume for bot logs
    dimbybot-downloads: {} # Define the new named volume for downloaded music files
    lavalink-plugins: {} # Define the new named volume for lavalink plugins
    postgres-data: {}
